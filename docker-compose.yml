services:
  postgres:
    image: postgres:16-alpine
    container_name: brm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: brm-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: brm-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MC_HOST_myminio: http://${MINIO_ACCESS_KEY}:${MINIO_SECRET_KEY}@minio:9000
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc mb --ignore-existing myminio/products;
      /usr/bin/mc anonymous set download myminio/products;
      /usr/bin/mc mb --ignore-existing myminio/system-assets;
      /usr/bin/mc anonymous set download myminio/system-assets;
      exit 0;
      "

volumes:
  pgdata:
    driver: local
  miniodata:
    driver: local
